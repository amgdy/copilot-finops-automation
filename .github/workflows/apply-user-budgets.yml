name: Apply user budgets

on:
  workflow_dispatch:
    inputs:
      enterprise_slug:
        description: GitHub Enterprise slug
        required: true
        type: string
      config_file:
        description: Budget policy configuration file
        required: true
        default: config/user-budget-policies.example.yml
        type: string
      policy_name:
        description: Optional single policy name to process
        required: false
        type: string
      dry_run:
        description: Preview only (no changes applied)
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_FINOPS_TOKEN != '' && secrets.COPILOT_FINOPS_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools
        run: |
          set -euo pipefail
          gh --version
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          jq --version
          yq --version

      - name: Validate config
        run: |
          scripts/validate-config.sh "${{ inputs.config_file }}" budgets

      - name: Apply budget policies
        run: |
          scripts/apply-user-budgets.sh \
            --enterprise-slug "${{ inputs.enterprise_slug }}" \
            --config-file "${{ inputs.config_file }}" \
            --policy-name "${{ inputs.policy_name }}" \
            --dry-run "${{ inputs.dry_run }}"
